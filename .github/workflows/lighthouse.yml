name: Lighthouse CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            https://risingtidedigital.us
            https://risingtidedigital.us/services.html
            https://risingtidedigital.us/contact.html
          uploadArtifacts: true
          temporaryPublicStorage: true
